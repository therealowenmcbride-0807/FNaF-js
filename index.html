<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">
    <title>Night 1</title>
</head>
<body>
    <div class="container" id="status-bar">
        <div id="time">12 AM</div>
        <div id="real-time">0.00</div><br>
        <div id="power">Power: 100%</div>
        <div id="usage"><span data-color="green">█</span> <span data-color="black">█</span> <span data-color="black">█</span> <span data-color="black">█</span></div>
    </div>
    <div class="container" id="view">
        <span id="you-are-in">You are in the office.<br></span><br>
        <div class="buttons">
            <button id="left-door-btn" onclick="checkLeftDoor()">Check Left Door</button>
            <button id="right-door-btn" onclick="checkRightDoor()">Check Right Door</button>
            <button id="camera-btn" onclick="checkCameras()">Check Cameras</button>
            <button id="shut-left-door-btn" onclick="shutLeftDoor()">Shut Left Door</button>
            <button id="shut-right-door-btn" onclick="shutRightDoor()">Shut Right Door</button>
            <button id="go-back-btn" onclick="goBack()">Go Back</button>
        </div>
    </div>
</body>
</html>
<script src="src/js/main.js"></script>
